name: Daglig AI-digest

on:
  schedule:
    # Kjører kl. 06:00 UTC = ca. 07:00–08:00 norsk tid
    - cron: "0 6 * * *"

  # Gjør det mulig å kjøre manuelt fra GitHub for testing
  workflow_dispatch:

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Hent kode fra repository
        uses: actions/checkout@v4

      - name: Sett opp Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer avhengigheter
        run: pip install -r requirements.txt

      - name: Kjør AI-digest og send epost
        env:
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:     ${{ secrets.RECIPIENT_EMAIL }}
        run: python news_digest.py
